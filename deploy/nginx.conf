server {
    listen 80;
    server_name nexus.herman-tsago.tech;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nexus.herman-tsago.tech;

    ssl_certificate     /etc/letsencrypt/live/nexus.herman-tsago.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus.herman-tsago.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 10M;

    # MCP endpoint — browser GET → friendly JSON-RPC error
    location = /mcp {
        if ($request_method = GET) {
            add_header Content-Type "application/json" always;
            return 200 '{"jsonrpc":"2.0","id":"server-error","error":{"code":-32600,"message":"Not Acceptable: Client must accept text/event-stream"}}';
        }
    }

    # MCP endpoint — proxy POST/other to Docker container on loopback
    location /mcp {
        proxy_pass         http://127.0.0.1:8765/mcp;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (streamable-http transport)
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Security headers
        add_header X-Content-Type-Options  nosniff always;
        add_header X-Frame-Options         DENY    always;
        add_header Referrer-Policy         no-referrer always;
    }

    # Health check endpoint (public, no auth)
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8765/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;

        proxy_method      POST;
        proxy_set_body    '{"jsonrpc":"2.0","id":0,"method":"ping"}';
        proxy_set_header  Content-Type "application/json";
        proxy_set_header  Accept "application/json, text/event-stream";
    }

    # OAuth 2.0 endpoints (authorize, token, register, consent, well-known)
    location ~ ^/(authorize|token|register|consent|\.well-known/) {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
